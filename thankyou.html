<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7a1730" />
  <title>شكراً على طلبك | Soumi Crochet</title>
  <meta name="description" content="تم تسجيل طلبك بنجاح في Soumi Crochet. أكدي التوصيل بسرعة عبر واتساب." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="thankyou-page">
    <div class="container">
      <section class="thankyou-card glass">
        <span class="eyebrow">ORDER CONFIRMED</span>
        <h1>🎉 شكراً على طلبك!</h1>
        <p class="lead">توصلنا بالمعلومات ديالك بنجاح. باش نسرّعو تأكيد التوصيل، ضغطي على زر واتساب ودوزي لينا رسالة التأكيد.</p>

        <div class="thankyou-product">
          <img id="thankProductImage" src="assets/img/hero-main.jpg" alt="Selected Soumi Crochet bag" />
          <div>
            <h2 id="thankProductName">Soumi Crochet Bag</h2>
            <p><strong>الثمن:</strong> <span id="thankProductPrice">—</span></p>
            <p><strong>الاسم:</strong> <span id="thankCustomerName">—</span></p>
            <p><strong>المدينة:</strong> <span id="thankCity">—</span></p>
            <small id="thankImageUrl"></small>
          </div>
        </div>

        <div class="thankyou-actions">
          <a class="btn btn-primary btn-glow pulse" href="https://wa.me/212662711995?text=سلام،%20قمت%20بطلب%20صاك%20من%20الموقع%20وبغيت%20نسرع%20التوصيل." target="_blank" rel="noopener">🚀 سرّعي تأكيد التوصيل عبر واتساب</a>
          <a class="btn btn-secondary glass" href="index.html">الرجوع للمتجر</a>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function(){
      const fallback = {product:'Soumi Crochet Bag', price:'—', name:'—', city:'—', imageAsset:'assets/img/hero-main.jpg', image:''};
      let data = fallback;
      try{
        data = JSON.parse(sessionStorage.getItem('soumi_last_order') || localStorage.getItem('soumi_last_order_backup') || 'null') || fallback;
      }catch(e){ data = fallback; }
      const set = (id, value) => { const el = document.getElementById(id); if(el) el.textContent = value || '—'; };
      const img = document.getElementById('thankProductImage');
      if(img){ img.src = data.imageAsset || 'assets/img/hero-main.jpg'; img.alt = data.product || 'Soumi Crochet Bag'; }
      set('thankProductName', data.product);
      set('thankProductPrice', data.price);
      set('thankCustomerName', data.name);
      set('thankCity', data.city);
      set('thankImageUrl', data.image);
    })();
  </script>
</body>
</html>
